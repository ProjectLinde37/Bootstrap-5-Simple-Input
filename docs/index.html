<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Goosse Input – Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <!-- Goosse Input CSS -->
    <link rel="stylesheet" href="input.css">
</head>

<body class="p-4">

<div class="container">
    <h1 class="mb-4">Goosse Input – Demo</h1>

    <p class="text-muted">
        This page demonstrates the Goosse Input component using plain JavaScript
        and Bootstrap 5.
    </p>

    <div class="d-flex flex-wrap gap-2 mt-4">

        <button class="btn btn-primary" id="btn-basic">
            Basic input
        </button>

        <button class="btn btn-secondary" id="btn-multi">
            Multiple fields
        </button>

        <button class="btn btn-warning" id="btn-confirm">
            Confirm with checkbox
        </button>

        <button class="btn btn-info" id="btn-edit">
            Edit mode
        </button>

    </div>
</div>

<!-- Bootstrap JS -->
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Goosse Input JS -->
<script src="input.js"></script>

<!-- Demo logic -->
<script src="demo.js"></script>

</body>
</html>
